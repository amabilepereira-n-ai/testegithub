<!DOCTYPE html>
<!-- Define que o documento utiliza HTML5 -->
<html lang="pt-BR">

<head>
    <!-- Configura a codificação de caracteres -->
    <meta charset="UTF-8">

    <!-- Faz a página funcionar corretamente em celulares -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da aba do navegador -->
    <title>Catálogo CreLuz</title>
</head>

<body>

    <!-- Título principal da página -->
    <h1>Catálogo de Lâmpadas — CreLuz</h1>

    <!-- Link para página de detalhes -->
    <a href="led.html" target="_blank">

        <!-- Agrupa imagem e legenda -->
        <figure>

            <!-- Exibe a imagem da lâmpada -->
            <!-- loading="lazy" faz a imagem carregar apenas quando necessário -->
            <img src="led.jpg"
                 alt="Lâmpada LED branca de 9W"
                 width="200"
                 loading="lazy">

            <!-- Legenda da imagem -->
            <figcaption>LED - R$ 25,00</figcaption>

        </figure>
    </a>

    <a href="fluorescente.html" target="_blank">
        <figure>

            <img src="fluorescente.jpg"
                 alt="Lâmpada fluorescente tubular branca"
                 width="200"
                 loading="lazy">

            <figcaption>Fluorescente - R$ 18,00</figcaption>

        </figure>
    </a>

    <a href="incandescente.html" target="_blank">
        <figure>

            <img src="incandescente.jpg"
                 alt="Lâmpada incandescente transparente"
                 width="200"
                 loading="lazy">

            <figcaption>Incandescente - R$ 12,00</figcaption>

        </figure>
    </a>

</body>

</html>
